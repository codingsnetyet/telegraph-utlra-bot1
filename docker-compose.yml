version: "3.9"

services:
  telegraph-bot:
    build: .

    container_name: telegraph-ultra-bot

    restart: always

    environment:
      API_ID: "123456"
      API_HASH: "your_api_hash"
      BOT_TOKEN: "your_bot_token"
      OWNER_ID: "7284759394"
      MONGO_URL: "your_mongodb_url"

    volumes:
      - .:/app

